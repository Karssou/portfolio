name: Deploy
on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 24

      - name: Install dependencies
        working-directory: ./
        run: |
          npm ci --prefer-offline --no-audit --progress=false

      - name: Build Nuxt frontend
        working-directory: ./
        run: |
          npm run build

      - name: Clean previous .output
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            echo "Cleaning old .output..."
            rm -rf ~/Portfolio/.output

      - name: Transfer .output
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          source: "./.output/*"
          target: "~/Portfolio/.output"
          strip_components: 1

      - name: Launch frontend on Raspberry Pi
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            RED='\033[0;31m'
            GREEN='\033[0;32m'
            YELLOW='\033[1;33m'
            NC='\033[0m'
            APP_PATH="$HOME/Portfolio"
            echo -e "${YELLOW}=== Début du déploiement du portfolio ===${NC}"
            cd "$APP_PATH" || { echo -e "${RED}❌ Impossible d'accéder au dossier ${APP_PATH}${NC}"; exit 1; }
            echo -e "${YELLOW}🔄 Arrêt du conteneur existant (si présent)...${NC}"
            docker compose -f docker-compose.yml down || true
            echo -e "${YELLOW}🐳 Lancement du conteneur portfolio...${NC}"
            docker compose -f docker-compose.yml up --build -d --remove-orphans || { echo -e "${RED}❌ Erreur lors du démarrage du conteneur${NC}"; exit 1; }
            echo -e "${YELLOW}🧹 Nettoyage des images Docker inutilisées...${NC}"
            docker image prune -f || { echo -e "${RED}❌ Erreur lors du nettoyage${NC}"; exit 1; }
            if docker ps | grep -q "portfolio"; then
              echo -e "${GREEN}============================${NC}"
              echo -e "${GREEN}✨ Déploiement du portfolio terminé avec succès ! ✨${NC}"
              echo -e "${GREEN}============================${NC}"
            else
              echo -e "${RED}❌ ÉCHEC : Le conteneur portfolio n'est pas démarré.${NC}"
              exit 1
            fi
